name: Android TalkBack E2E Tests

# Android tests require an AVD emulator — they run separately from the main CI.
# Triggered on release tags only (AVD boot takes ~10 min).
# The main ci.yml cannot trigger on tag pushes (it runs on branches only).
# This workflow mirrors the structure of ios-e2e.yml for symmetry.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  e2e-android-talkback:
    name: E2E — Android (TalkBack emulator)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if Android E2E tests exist
        id: check_tests
        run: |
          # Tests live at tests/e2e/platforms/android/ (per testing.md layout)
          if [ -d "tests/e2e/platforms/android" ] && [ "$(ls tests/e2e/platforms/android/test_*.py 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Android E2E tests found at tests/e2e/platforms/android/ — skipping"
          fi

      - name: Enable KVM (hardware acceleration for AVD)
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Python
        if: steps.check_tests.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          pip install setuptools
          pip install -r requirements.txt --no-build-isolation 2>/dev/null || true
          pip install pytest pytest-asyncio
          pip install -e . 2>/dev/null || pip install -e . --no-build-isolation 2>/dev/null || true

      - name: Set up Node.js
        if: steps.check_tests.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: clients/mobile/package-lock.json

      - name: Install JS dependencies
        if: steps.check_tests.outputs.exists == 'true'
        working-directory: clients/mobile
        run: npm ci --legacy-peer-deps

      - name: Start Python backend
        if: steps.check_tests.outputs.exists == 'true'
        env:
          API_SERVER_TOKEN: test-token-android-ci
        run: |
          # Start the FastAPI backend server for the E2E tests
          python -m blind_assistant.main --api --host 127.0.0.1 --port 8000 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          sleep 3
          curl -f http://127.0.0.1:8000/health || echo "Backend may not be ready yet"

      - name: Run Android emulator tests (TalkBack)
        if: steps.check_tests.outputs.exists == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        env:
          BACKEND_URL: http://127.0.0.1:8000
          API_SERVER_TOKEN: test-token-android-ci
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # AVD name must match what tests/e2e/platforms/android/conftest.py expects
          avd-name: blind_assistant_test
          script: pytest tests/e2e/platforms/android/ -m "android" -v --tb=short 2>&1 | tee android-talkback.log

      - name: Stop backend
        if: always() && steps.check_tests.outputs.exists == 'true'
        run: kill $BACKEND_PID 2>/dev/null || true

      - name: Upload Android screenshots and logs
        if: always() && steps.check_tests.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-talkback-screenshots-${{ github.run_number }}
          path: |
            screenshots/
            tests/e2e/platforms/android/screenshots/
            android-talkback.log
            /tmp/talkback_*.png
          retention-days: 14
