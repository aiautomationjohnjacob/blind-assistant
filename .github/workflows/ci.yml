name: CI — Lint, Test, Coverage, Security

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Lint and format check
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check style (ruff lint)
        run: ruff check src/ tests/

      - name: Check formatting (ruff format)
        run: ruff format --check src/ tests/

  # ──────────────────────────────────────────────────────────
  # JOB 2: Static type checking
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install mypy
          # Install stubs for typed libraries
          pip install types-PyYAML types-python-dateutil
          # openai-whisper uses legacy setup.py with pkg_resources; --no-build-isolation
          # prevents pip from creating an isolated build env that lacks pkg_resources.
          pip install setuptools
          # Install project deps so mypy can resolve imports
          pip install -r requirements.txt --no-build-isolation 2>/dev/null || true

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports

  # ──────────────────────────────────────────────────────────
  # JOB 3: Tests with coverage (the main gate)
  # ──────────────────────────────────────────────────────────
  test:
    name: Tests & coverage (≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            libportaudio2 libportaudiocpp0 portaudio19-dev \
            tesseract-ocr \
            libasound2-dev

      - name: Install test dependencies
        run: |
          pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            pytest-mock \
            respx \
            httpx \
            keyring \
            cryptography

      - name: Install project dependencies
        # openai-whisper uses legacy setup.py with pkg_resources. Modern pip uses PEP 517
        # build isolation which creates a fresh env; in setuptools>=71 pkg_resources was
        # split out and the isolated env doesn't include it. --no-build-isolation uses
        # the outer env where setuptools ships pkg_resources. setuptools pre-install is
        # still needed for the editable install step.
        run: |
          pip install setuptools
          pip install -r requirements.txt --no-build-isolation

      - name: Install project (editable)
        run: pip install -e . 2>/dev/null || pip install -e . --no-build-isolation 2>/dev/null || true

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src/blind_assistant \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -m "not integration and not slow" \
            2>&1 | tee test-output.log

      - name: Check security module coverage (must be 100%)
        run: |
          pytest tests/ \
            --cov=src/blind_assistant/security \
            --cov-report=term-missing \
            --cov-fail-under=100 \
            -m "security or unit" \
            2>&1 || {
              echo "SECURITY MODULE COVERAGE BELOW 100% — THIS MUST BE FIXED"
              exit 1
            }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: |
            coverage.xml
            test-output.log
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 4: Security audit
  # ──────────────────────────────────────────────────────────
  security:
    name: Security audit (pip-audit + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install audit tools and project dependencies
        # openai-whisper uses legacy setup.py with pkg_resources. --no-build-isolation
        # uses the outer env (where setuptools ships pkg_resources) instead of creating
        # an isolated build env that lacks it. We install all requirements first, then
        # run pip-audit against the installed environment (no -r flag) so pip-audit
        # never needs to build wheels itself.
        run: |
          pip install setuptools
          pip install pip-audit bandit
          pip install -r requirements.txt --no-build-isolation

      - name: Audit dependencies for known CVEs
        # Audit the currently-installed environment (not -r requirements.txt)
        # so pip-audit reads installed package metadata rather than building wheels.
        # torch CVE ignores:
        #   PYSEC-2024-259: disputed — intended behavior in PyTorch distributed
        #   CVE-2025-2953, CVE-2025-3730: local-only DoS; no network attack surface
        #   PYSEC-2025-41: local RCE via weights_only=True; we don't load untrusted models
        # All four are low/no risk for our local-execution, offline STT use case.
        run: |
          pip-audit --desc \
            --ignore-vuln PYSEC-2024-259 \
            --ignore-vuln PYSEC-2025-41 \
            --ignore-vuln CVE-2025-2953 \
            --ignore-vuln CVE-2025-3730

      - name: Static security analysis (bandit)
        run: |
          bandit -r src/ \
            -ll \
            --format txt \
            --exclude tests/ \
            2>&1 | tee bandit-output.txt
          # Fail if any MEDIUM or HIGH issues found
          grep -qE "Issue: \[.*MEDIUM|Issue: \[.*HIGH" bandit-output.txt && {
            echo "Bandit found MEDIUM or HIGH severity issues — must fix"
            exit 1
          } || echo "No medium/high severity issues found"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: bandit-output.txt
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 5: React Native / JavaScript tests (Jest)
  # Covers: clients/mobile/ — API client + MainScreen accessibility
  # Runs on every push. Requires npm install first.
  # Coverage gate: 75% lines/statements, 70% branches/functions (package.json)
  # ──────────────────────────────────────────────────────────
  test-js:
    name: JS tests & coverage (clients/mobile/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: clients/mobile/package-lock.json

      - name: Install dependencies
        # --legacy-peer-deps: expo ecosystem has some peer-dep version conflicts
        # that don't affect runtime behavior
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests with coverage
        run: npm test -- --watchAll=false --ci
        # Jest exits non-zero if coverage thresholds (in package.json) are not met

      - name: Upload JS coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage-report-${{ github.run_number }}
          path: clients/mobile/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 6a: Education site tests (React — clients/education/)
  # Audio-primary WCAG 2.1 AA site for learn.blind-assistant.org
  # ──────────────────────────────────────────────────────────
  test-education:
    name: Education site tests (clients/education/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/education
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: clients/education/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Jest accessibility tests
        run: npm test -- --watchAll=false --ci
        env:
          CI: true

      - name: Upload education coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: education-coverage-report-${{ github.run_number }}
          path: clients/education/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 6b: Web E2E tests (Playwright — all browsers)
  # Runs on every push; no device hardware needed.
  # Skipped if tests/e2e/web/ doesn't exist yet.
  # ──────────────────────────────────────────────────────────
  e2e-web:
    name: E2E — Web (Playwright accessibility audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Node.js — needed to build the Expo web bundle ──────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/mobile/package-lock.json

      - name: Install JS dependencies
        working-directory: clients/mobile
        run: npm ci --legacy-peer-deps

      - name: Build Expo web bundle
        working-directory: clients/mobile
        run: npx expo export --platform web
        # Produces clients/mobile/dist/ with index.html + JS bundle

      # ── Python — needed to serve the bundle and run Playwright tests ───────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Playwright Python bindings
        run: |
          pip install playwright pytest pytest-asyncio pytest-playwright
          playwright install chromium || true
          playwright install-deps chromium || true

      - name: Start web server (serve Expo dist/)
        working-directory: clients/mobile
        run: |
          # Serve the built bundle on port 19006 in the background.
          # Python's built-in http.server is good enough for CI.
          python -m http.server 19006 --directory dist/ &
          echo "WEB_SERVER_PID=$!" >> $GITHUB_ENV
          # Give the server a moment to start
          sleep 2
          # Verify it responds
          curl -f http://localhost:19006/ -o /dev/null --silent && echo "Server up" || echo "Server may not be ready"

      - name: Run web E2E accessibility tests (Chromium — NVDA+Chrome)
        run: |
          pytest tests/e2e/platforms/web/ \
            --browser chromium \
            --screenshot on \
            -v 2>&1 | tee e2e-web-chrome.log

      - name: Run web E2E accessibility tests (Firefox — NVDA+Firefox)
        run: |
          pytest tests/e2e/platforms/web/ \
            --browser firefox \
            --screenshot on \
            -v 2>&1 | tee e2e-web-firefox.log

      - name: Stop web server
        if: always()
        run: kill $WEB_SERVER_PID 2>/dev/null || true

      - name: Upload E2E screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-screenshots-${{ github.run_number }}
          path: |
            test-results/
            e2e-web-*.log
            screenshots/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 6: Android E2E tests (emulator) — release tags only
  # Running AVD emulators is slow (~10 min boot) and expensive.
  # Only runs on version tags (v*.*.*) to gate releases.
  # Tests live in tests/e2e/platforms/android/ (the standard layout).
  # ──────────────────────────────────────────────────────────
  e2e-android:
    name: E2E — Android (TalkBack emulator)
    runs-on: ubuntu-latest
    # Only run on release tags (too slow for every push)
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Check if Android E2E tests exist
        id: check_tests
        run: |
          # Tests live at tests/e2e/platforms/android/ (per testing.md layout)
          if [ -d "tests/e2e/platforms/android" ] && [ "$(ls tests/e2e/platforms/android/test_*.py 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Android E2E tests found at tests/e2e/platforms/android/ — skipping"
          fi

      - name: Enable KVM (for hardware acceleration)
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Python
        if: steps.check_tests.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install test dependencies
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          pip install setuptools
          pip install pytest pytest-asyncio
          pip install -r requirements.txt --no-build-isolation 2>/dev/null || true
          pip install -e . 2>/dev/null || pip install -e . --no-build-isolation 2>/dev/null || true

      - name: Build Expo Android APK
        if: steps.check_tests.outputs.exists == 'true'
        working-directory: clients/mobile
        run: |
          npm ci --legacy-peer-deps
          # Build a debug APK using Expo bare workflow
          # (EAS Build is preferred for production; local Gradle build for CI)
          echo "Note: Expo Go APK used for TalkBack accessibility testing in CI"

      - name: Run Android emulator tests (TalkBack)
        if: steps.check_tests.outputs.exists == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # AVD name must match what tests/e2e/platforms/android/conftest.py expects
          avd-name: blind_assistant_test
          script: |
            # Start the Python backend server for the tests
            pip install -e . --no-build-isolation 2>/dev/null || true
            python -m blind_assistant.main --api &
            sleep 3
            # Run all TalkBack E2E tests
            pytest tests/e2e/platforms/android/ -m "android" -v --tb=short

      - name: Upload Android screenshots
        if: always() && steps.check_tests.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-screenshots-${{ github.run_number }}
          path: |
            screenshots/
            tests/e2e/platforms/android/screenshots/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 7: Browser integration tests (real Playwright + local HTML fixtures)
  # Addresses ISSUE-021: validates BrowserTool on real (non-mocked) Playwright.
  # Does NOT make external network calls — serves test HTML from a local fixture.
  # Runs on every push because it's fast (<30s) and requires no device hardware.
  # ──────────────────────────────────────────────────────────
  integration-browser:
    name: Browser integration tests (BrowserTool + real Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            libportaudio2 libportaudiocpp0 portaudio19-dev \
            tesseract-ocr \
            libasound2-dev

      - name: Install project dependencies
        # openai-whisper uses legacy setup.py with pkg_resources. --no-build-isolation
        # prevents pip from creating an isolated build env that lacks pkg_resources
        # (separated from setuptools in >=71). The outer env has setuptools with pkg_resources.
        run: |
          pip install setuptools
          pip install -r requirements.txt --no-build-isolation
          pip install pytest pytest-asyncio pytest-cov

      - name: Install project (editable)
        run: pip install -e . 2>/dev/null || pip install -e . --no-build-isolation 2>/dev/null || true

      - name: Install Playwright system dependencies
        # This is the step that requires root — available in GitHub Actions.
        # "|| true" because playwright 1.41 lists libasound2 which is a virtual package
        # on Ubuntu 24.04 (Noble); apt exits 100 but chromium still works for our tests.
        run: playwright install-deps chromium || true

      - name: Install Playwright Chromium browser
        run: playwright install chromium

      - name: Run browser integration tests
        # PLAYWRIGHT_AVAILABLE=1 overrides the skip in the test file
        env:
          PLAYWRIGHT_AVAILABLE: "1"
        run: |
          pytest tests/integration/test_browser_tool_real.py \
            -v \
            --tb=short \
            2>&1 | tee integration-browser.log

      - name: Upload browser test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-browser-log-${{ github.run_number }}
          path: integration-browser.log
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # NOTE: iOS E2E tests (iOS Simulator) require a macOS runner
  # and Xcode. These are expensive and run only on release tags
  # in a separate workflow: .github/workflows/ios-e2e.yml
  # (created by devops-engineer when iOS app exists)
  # ──────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────
  # JOB 8: Create GitHub issue if CI fails on main
  # ──────────────────────────────────────────────────────────
  notify-failure:
    name: Create issue on main branch failure
    needs: [lint, typecheck, test, test-js, security, e2e-web, integration-browser]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failed on main — ${context.sha.substring(0,7)}`,
              body: [
                '## CI checks failed after a commit to main',
                '',
                `**Commit:** \`${context.sha}\``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '## Failed checks',
                `- Lint: ${{ needs.lint.result }}`,
                `- Type check: ${{ needs.typecheck.result }}`,
                `- Tests/coverage (Python): ${{ needs.test.result }}`,
                `- Tests/coverage (JS — clients/mobile/): ${{ needs.test-js.result }}`,
                `- Security: ${{ needs.security.result }}`,
                `- Web E2E (Playwright): ${{ needs.e2e-web.result }}`,
                `- Browser integration (BrowserTool + real Playwright): ${{ needs.integration-browser.result }}`,
                '',
                '## What to do',
                '1. Click the run link above and read the failing step',
                '2. Fix the issue in a new commit (do NOT delete failing tests)',
                '3. Push to main — CI will re-run automatically',
                '',
                '**The autonomous development loop should NOT run new features until CI is green.**',
              ].join('\n'),
              labels: ['ci-failure', 'P0', 'needs-review']
            });
