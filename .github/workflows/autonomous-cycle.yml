name: Autonomous Development Cycle

on:
  # Run every 4 hours automatically
  schedule:
    - cron: '0 */4 * * *'
  # Also allow manual trigger with optional phase override
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run (default: run-cycle)'
        required: false
        default: 'run-cycle'
      notes:
        description: 'Optional notes to pass to the AI'
        required: false
        default: ''

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # Stay under 60min GitHub Actions limit

    permissions:
      contents: write   # Commit and push progress
      issues: write     # Create issues for blockers
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Full history for git log in retrospectives

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.email "ai-agent@blind-assistant.dev"
          git config user.name "Blind Assistant AI"

      - name: Run autonomous cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMAND="${{ github.event.inputs.command || 'run-cycle' }}"
          NOTES="${{ github.event.inputs.notes }}"

          # Build the prompt
          PROMPT="$(cat .claude/prompts/kick-off.md)"
          if [ -n "$NOTES" ]; then
            PROMPT="$PROMPT\n\nAdditional context from human: $NOTES"
          fi

          # Run Claude Code headlessly
          claude \
            --model claude-opus-4-6 \
            --max-turns 80 \
            --output-format text \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep,Agent" \
            --permission-mode bypassPermissions \
            -p "$PROMPT" \
            2>&1 | tee cycle-output.log

      - name: Push any changes made by the AI
        run: |
          git add -A
          if git status --short | grep -q .; then
            git commit -m "ci: autonomous cycle $(date +%Y-%m-%d-%H%M) — pushing uncommitted changes" || true
          fi
          git push || true

      - name: Upload cycle log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-log-${{ github.run_number }}
          path: cycle-output.log
          retention-days: 30

      - name: Create issue if cycle failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Autonomous cycle failed — Run #${context.runNumber}`,
              body: `The autonomous development cycle failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck cycle-output.log artifact for details.`,
              labels: ['cycle-failure', 'needs-review']
            })
