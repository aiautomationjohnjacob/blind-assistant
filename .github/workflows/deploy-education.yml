name: Deploy — Education Site (GitHub Pages)

# Deploys clients/education/ to GitHub Pages on every push to main.
# The site will be available at https://<org>.github.io/blind-assistant/
# and should be pointed to learn.blind-assistant.org via a CNAME.
#
# Prerequisites (one-time setup — no secrets required):
#   1. Go to Repository → Settings → Pages → Source → GitHub Actions
#   2. The workflow handles everything else automatically.
#
# Accessibility note:
#   GitHub Pages is free, permanent, and requires no external accounts.
#   This makes it the right choice for a nonprofit: no visual setup needed,
#   no billing, and the URL is stable for NVDA/VoiceOver bookmarks.
#
# Custom domain (learn.blind-assistant.org):
#   Add a CNAME file to clients/education/public/ containing:
#     learn.blind-assistant.org
#   Then configure a CNAME DNS record pointing to <org>.github.io.
#   The workflow writes the CNAME into the build output automatically.
#
# HashRouter note:
#   The site uses HashRouter (/#/course/...) so every URL works without
#   server-side rewrites — GitHub Pages serves only static files.

on:
  push:
    branches: [main]
  # Allow manual deploys from GitHub Actions UI (keyboard-accessible trigger)
  workflow_dispatch:

# Only deploy the latest — cancel in-progress deploys when a new push arrives
concurrency:
  group: deploy-education
  cancel-in-progress: true

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and deploy education site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: clients/education/package-lock.json

      - name: Install dependencies
        working-directory: clients/education
        # --legacy-peer-deps resolves the react-scripts 5 / TypeScript 5 peer conflict.
        run: npm ci --legacy-peer-deps

      - name: Build education site
        working-directory: clients/education
        # CI=false prevents react-scripts from treating warnings as errors.
        # The site uses HashRouter so all assets use relative paths (homepage: ".").
        env:
          CI: false
        run: npm run build

      - name: Write CNAME for learn.blind-assistant.org
        # This tells GitHub Pages to serve the site at the custom domain.
        # The DNS operator must add a CNAME record: learn.blind-assistant.org → <org>.github.io
        run: echo "learn.blind-assistant.org" > clients/education/build/CNAME

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: clients/education/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post deploy summary
        run: |
          echo "### Education Site Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Custom domain**: learn.blind-assistant.org (when CNAME DNS is configured)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test with: NVDA + Chrome, VoiceOver + Safari, TalkBack + Chrome" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Keyboard test: Tab through site with no mouse — all interactions must work" >> $GITHUB_STEP_SUMMARY
