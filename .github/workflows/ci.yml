name: CI — Lint, Test, Coverage, Security

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Lint and format check
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check style (ruff lint)
        run: ruff check src/ tests/

      - name: Check formatting (ruff format)
        run: ruff format --check src/ tests/

  # ──────────────────────────────────────────────────────────
  # JOB 2: Static type checking
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install mypy
          # Install stubs for typed libraries
          pip install types-PyYAML types-python-dateutil
          # Install project deps so mypy can resolve imports
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports

  # ──────────────────────────────────────────────────────────
  # JOB 3: Tests with coverage (the main gate)
  # ──────────────────────────────────────────────────────────
  test:
    name: Tests & coverage (≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            libportaudio2 libportaudiocpp0 portaudio19-dev \
            tesseract-ocr \
            libasound2-dev

      - name: Install test dependencies
        run: |
          pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            pytest-mock \
            respx \
            httpx \
            keyring \
            cryptography

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install project (editable)
        run: pip install -e . 2>/dev/null || pip install -e . --no-build-isolation 2>/dev/null || true

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src/blind_assistant \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -m "not integration and not slow" \
            2>&1 | tee test-output.log

      - name: Check security module coverage (must be 100%)
        run: |
          pytest tests/ \
            --cov=src/blind_assistant/security \
            --cov-report=term-missing \
            --cov-fail-under=100 \
            -m "security or unit" \
            2>&1 || {
              echo "SECURITY MODULE COVERAGE BELOW 100% — THIS MUST BE FIXED"
              exit 1
            }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: |
            coverage.xml
            test-output.log
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 4: Security audit
  # ──────────────────────────────────────────────────────────
  security:
    name: Security audit (pip-audit + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install audit tools
        run: pip install pip-audit bandit

      - name: Audit dependencies for known CVEs
        # --no-deps: check listed packages only, skip dependency resolution
        # Avoids build failures from packages requiring system libs (whisper, sounddevice)
        run: pip-audit -r requirements.txt --desc --no-deps

      - name: Static security analysis (bandit)
        run: |
          bandit -r src/ \
            -ll \
            --format txt \
            --exclude tests/ \
            2>&1 | tee bandit-output.txt
          # Fail if any MEDIUM or HIGH issues found
          grep -qE "Issue: \[.*MEDIUM|Issue: \[.*HIGH" bandit-output.txt && {
            echo "Bandit found MEDIUM or HIGH severity issues — must fix"
            exit 1
          } || echo "No medium/high severity issues found"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: bandit-output.txt
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 5: Create GitHub issue if CI fails on main
  # ──────────────────────────────────────────────────────────
  notify-failure:
    name: Create issue on main branch failure
    needs: [lint, typecheck, test, security]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const failedJobs = ['lint', 'typecheck', 'test', 'security'].filter(
              job => '${{ needs.lint.result }}' === 'failure' ||
                     '${{ needs.typecheck.result }}' === 'failure' ||
                     '${{ needs.test.result }}' === 'failure' ||
                     '${{ needs.security.result }}' === 'failure'
            );

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 CI failed on main — ${context.sha.substring(0,7)}`,
              body: [
                '## CI checks failed after a commit to main',
                '',
                `**Commit:** \`${context.sha}\``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '## Failed checks',
                `- Lint: ${{ needs.lint.result }}`,
                `- Type check: ${{ needs.typecheck.result }}`,
                `- Tests/coverage: ${{ needs.test.result }}`,
                `- Security: ${{ needs.security.result }}`,
                '',
                '## What to do',
                '1. Click the run link above and read the failing step',
                '2. Fix the issue in a new commit (do NOT delete failing tests)',
                '3. Push to main — CI will re-run automatically',
                '',
                '**The autonomous development loop should NOT run new features until CI is green.**',
              ].join('\n'),
              labels: ['ci-failure', 'P0', 'needs-review']
            });
