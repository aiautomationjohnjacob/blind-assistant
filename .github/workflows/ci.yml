name: CI — Lint, Test, Coverage, Security

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Lint and format check
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check style (ruff lint)
        run: ruff check src/ tests/

      - name: Check formatting (ruff format)
        run: ruff format --check src/ tests/

  # ──────────────────────────────────────────────────────────
  # JOB 2: Static type checking
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install mypy
          # Install stubs for typed libraries
          pip install types-PyYAML types-python-dateutil
          # Install project deps so mypy can resolve imports
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports

  # ──────────────────────────────────────────────────────────
  # JOB 3: Tests with coverage (the main gate)
  # ──────────────────────────────────────────────────────────
  test:
    name: Tests & coverage (≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            libportaudio2 libportaudiocpp0 portaudio19-dev \
            tesseract-ocr \
            libasound2-dev

      - name: Install test dependencies
        run: |
          pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            pytest-mock \
            respx \
            httpx \
            keyring \
            cryptography

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install project (editable)
        run: pip install -e . 2>/dev/null || pip install -e . --no-build-isolation 2>/dev/null || true

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src/blind_assistant \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -m "not integration and not slow" \
            2>&1 | tee test-output.log

      - name: Check security module coverage (must be 100%)
        run: |
          pytest tests/ \
            --cov=src/blind_assistant/security \
            --cov-report=term-missing \
            --cov-fail-under=100 \
            -m "security or unit" \
            2>&1 || {
              echo "SECURITY MODULE COVERAGE BELOW 100% — THIS MUST BE FIXED"
              exit 1
            }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: |
            coverage.xml
            test-output.log
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 4: Security audit
  # ──────────────────────────────────────────────────────────
  security:
    name: Security audit (pip-audit + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install audit tools
        run: pip install pip-audit bandit

      - name: Audit dependencies for known CVEs
        # --no-deps: check listed packages only, skip dependency resolution
        # Avoids build failures from packages requiring system libs (whisper, sounddevice)
        run: pip-audit -r requirements.txt --desc --no-deps

      - name: Static security analysis (bandit)
        run: |
          bandit -r src/ \
            -ll \
            --format txt \
            --exclude tests/ \
            2>&1 | tee bandit-output.txt
          # Fail if any MEDIUM or HIGH issues found
          grep -qE "Issue: \[.*MEDIUM|Issue: \[.*HIGH" bandit-output.txt && {
            echo "Bandit found MEDIUM or HIGH severity issues — must fix"
            exit 1
          } || echo "No medium/high severity issues found"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: bandit-output.txt
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 5: React Native / JavaScript tests (Jest)
  # Covers: clients/mobile/ — API client + MainScreen accessibility
  # Runs on every push. Requires npm install first.
  # Coverage gate: 75% lines/statements, 70% branches/functions (package.json)
  # ──────────────────────────────────────────────────────────
  test-js:
    name: JS tests & coverage (clients/mobile/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: clients/mobile/package-lock.json

      - name: Install dependencies
        # --legacy-peer-deps: expo ecosystem has some peer-dep version conflicts
        # that don't affect runtime behavior
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests with coverage
        run: npm test -- --watchAll=false --ci
        # Jest exits non-zero if coverage thresholds (in package.json) are not met

      - name: Upload JS coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage-report-${{ github.run_number }}
          path: clients/mobile/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 6: Web E2E tests (Playwright — all browsers)
  # Runs on every push; no device hardware needed.
  # Skipped if tests/e2e/web/ doesn't exist yet.
  # ──────────────────────────────────────────────────────────
  e2e-web:
    name: E2E — Web (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if web E2E tests exist
        id: check_tests
        run: |
          if [ -d "tests/e2e/web" ] && [ "$(ls tests/e2e/web/test_*.py 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No web E2E tests found — skipping (add tests to tests/e2e/web/)"
          fi

      - uses: actions/setup-python@v5
        if: steps.check_tests.outputs.exists == 'true'
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Playwright and dependencies
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          pip install playwright pytest pytest-playwright
          playwright install chromium firefox webkit
          playwright install-deps

      - name: Install project dependencies
        if: steps.check_tests.outputs.exists == 'true'
        run: pip install -r requirements.txt

      - name: Run web E2E tests (Chromium)
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          pytest tests/e2e/web/ \
            -m "web" \
            --browser chromium \
            --screenshot on \
            -v 2>&1 | tee e2e-web-chrome.log

      - name: Run web E2E tests (Firefox — NVDA combo)
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          pytest tests/e2e/web/ \
            -m "web" \
            --browser firefox \
            --screenshot on \
            -v 2>&1 | tee e2e-web-firefox.log

      - name: Run web E2E tests (WebKit — VoiceOver+Safari combo)
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          pytest tests/e2e/web/ \
            -m "web" \
            --browser webkit \
            --screenshot on \
            -v 2>&1 | tee e2e-web-webkit.log

      - name: Upload E2E screenshots
        if: always() && steps.check_tests.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-screenshots-${{ github.run_number }}
          path: |
            test-results/
            e2e-web-*.log
            screenshots/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 6: Android E2E tests (emulator) — release tags only
  # Running AVD emulators is slow (~10 min boot) and expensive.
  # Only runs on version tags (v*.*.*) to gate releases.
  # Skipped if tests/e2e/android/ doesn't exist yet.
  # ──────────────────────────────────────────────────────────
  e2e-android:
    name: E2E — Android (emulator)
    runs-on: ubuntu-latest
    # Only run on release tags (too slow for every push)
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Check if Android E2E tests exist
        id: check_tests
        run: |
          if [ -d "tests/e2e/android" ] && [ "$(ls tests/e2e/android/test_*.py 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Android E2E tests found — skipping"
          fi

      - name: Enable KVM (for hardware acceleration)
        if: steps.check_tests.outputs.exists == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android emulator tests
        if: steps.check_tests.outputs.exists == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            pip install pytest
            pytest tests/e2e/android/ -m "android" -v

      - name: Upload Android screenshots
        if: always() && steps.check_tests.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # NOTE: iOS E2E tests (iOS Simulator) require a macOS runner
  # and Xcode. These are expensive and run only on release tags
  # in a separate workflow: .github/workflows/ios-e2e.yml
  # (created by devops-engineer when iOS app exists)
  # ──────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────
  # JOB 8: Create GitHub issue if CI fails on main
  # ──────────────────────────────────────────────────────────
  notify-failure:
    name: Create issue on main branch failure
    needs: [lint, typecheck, test, test-js, security, e2e-web]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failed on main — ${context.sha.substring(0,7)}`,
              body: [
                '## CI checks failed after a commit to main',
                '',
                `**Commit:** \`${context.sha}\``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '## Failed checks',
                `- Lint: ${{ needs.lint.result }}`,
                `- Type check: ${{ needs.typecheck.result }}`,
                `- Tests/coverage: ${{ needs.test.result }}`,
                `- Security: ${{ needs.security.result }}`,
                `- Web E2E (Playwright): ${{ needs.e2e-web.result }}`,
                '',
                '## What to do',
                '1. Click the run link above and read the failing step',
                '2. Fix the issue in a new commit (do NOT delete failing tests)',
                '3. Push to main — CI will re-run automatically',
                '',
                '**The autonomous development loop should NOT run new features until CI is green.**',
              ].join('\n'),
              labels: ['ci-failure', 'P0', 'needs-review']
            });
