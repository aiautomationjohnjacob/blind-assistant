# Blind Assistant — Approved Package Registry
#
# This file lists Python packages the self-expanding capability may install.
# It is NOT a list of pre-built service integrations.
#
# Claude handles ordering, travel, home control etc. autonomously using the
# browser and desktop tools — navigating websites the same way a human would.
# No DoorDash-specific code, no Expedia wrapper, no Instacart class.
# This means zero maintenance when sites change, and works for any service.
#
# Pre-built integrations are only warranted for:
#   - Services requiring OAuth/API keys that can't be done via browser
#   - Payment tokenization (never store raw card numbers)
#   - Local hardware protocols (Home Assistant REST API, etc.)
#
# Vetting requirements before adding a package:
#   1. pip-audit CVE scan
#   2. >10k downloads/month on PyPI
#   3. Last release < 2 years ago
#   4. No known data exfiltration behavior

capabilities:
  - name: browser
    package: playwright
    version: "1.40.0"
    description: "a web browser I can control to navigate any website on your behalf"
    task_description: "navigate websites to complete tasks (ordering, booking, research, etc.)"
    # Claude reasons about ANY site — no service-specific wrappers needed

  - name: desktop_control
    package: pyautogui
    version: "0.9.54"
    description: "a tool to control desktop apps by simulating keyboard and mouse"
    task_description: "control native desktop applications on your behalf"

  - name: http_client
    package: aiohttp
    version: "3.9.3"
    description: "an async HTTP client for calling REST APIs"
    task_description: "connect to web services and APIs"

integrations:
  # Only services that CANNOT be handled by browser automation
  - name: stripe_payments
    package: stripe
    version: "7.3.0"
    description: "a payment processor that tokenizes your card — we never store the number"
    task_description: "process payments securely without storing your card number"
    allowed_endpoints:
      - "api.stripe.com"
    rationale: "Payment tokenization requires the Stripe SDK; browser-only cannot safely handle card data"

  - name: google_calendar
    package: google-api-python-client
    version: "2.114.0"
    description: "a connector to your Google Calendar"
    task_description: "manage your calendar and appointments"
    allowed_endpoints:
      - "googleapis.com"
      - "accounts.google.com"
    rationale: "Calendar API provides push notifications and offline sync not available via browser"

  - name: google_gmail
    package: google-api-python-client
    version: "2.114.0"
    description: "a connector to your Gmail account"
    task_description: "read and send emails on your behalf"
    allowed_endpoints:
      - "googleapis.com"
    rationale: "Gmail API allows background processing; browser automation would require active session"
