name: Autonomous Development Cycle

on:
  # Run every 4 hours automatically
  schedule:
    - cron: '0 */4 * * *'
  # Also allow manual trigger with optional phase override
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run (default: run-cycle)'
        required: false
        default: 'run-cycle'
      notes:
        description: 'Optional notes to pass to the AI'
        required: false
        default: ''

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # Stay under 60min GitHub Actions limit

    permissions:
      contents: write   # Commit and push progress
      issues: write     # Create issues for blockers
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Full history for git log in retrospectives

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            libportaudio2 libportaudiocpp0 portaudio19-dev \
            tesseract-ocr \
            libasound2-dev
        # Required for: openai-whisper (ffmpeg), sounddevice (portaudio),
        # pytesseract (tesseract). Without these, the cycle crashes on import.

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.email "ai-agent@blind-assistant.dev"
          git config user.name "Blind Assistant AI"

      - name: Run autonomous cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMAND="${{ github.event.inputs.command || 'run-cycle' }}"
          NOTES="${{ github.event.inputs.notes }}"

          # Build the prompt
          PROMPT="$(cat .claude/prompts/kick-off.md)"
          if [ -n "$NOTES" ]; then
            PROMPT="$PROMPT\n\nAdditional context from human: $NOTES"
          fi

          # Run Claude Code headlessly
          claude \
            --model claude-opus-4-6 \
            --max-turns 80 \
            --output-format text \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep,Agent" \
            --permission-mode bypassPermissions \
            -p "$PROMPT" \
            2>&1 | tee cycle-output.log

      - name: Push any changes made by the AI
        run: |
          git add -A
          if git status --short | grep -q .; then
            git commit -m "ci: autonomous cycle $(date +%Y-%m-%d-%H%M) — pushing uncommitted changes" || true
          fi
          git push || true

      # ── Run tests after every cycle ──────────────────────────
      - name: Install test dependencies
        if: always()
        run: |
          pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            pytest-mock \
            respx \
            httpx \
            keyring \
            cryptography 2>/dev/null || true
          pip install -r requirements.txt 2>/dev/null || true
          pip install -e . 2>/dev/null || true

      - name: Run test suite post-cycle
        id: run_tests
        if: always()
        run: |
          if [ -d "tests" ] && [ "$(find tests/ -name 'test_*.py' | wc -l)" -gt "0" ]; then
            pytest tests/ \
              --cov=src/blind_assistant \
              --cov-report=term-missing \
              --cov-fail-under=80 \
              --tb=short \
              -q \
              2>&1 | tee test-results.log
            echo "tests_ran=true" >> $GITHUB_OUTPUT
          else
            echo "No tests found — skipping coverage check."
            echo "tests_ran=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload cycle log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-log-${{ github.run_number }}
          path: cycle-output.log
          retention-days: 30

      - name: Create issue if cycle or tests failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const testsRan = '${{ steps.run_tests.outputs.tests_ran }}' === 'true';
            const title = testsRan
              ? `Tests failing after autonomous cycle — Run #${context.runNumber}`
              : `Autonomous cycle failed — Run #${context.runNumber}`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: [
                '## Autonomous cycle failure',
                '',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                testsRan
                  ? '**Tests failed after this cycle.** The autonomous loop has introduced a regression. DO NOT add new features until tests pass. Fix the failing tests by fixing the implementation — never by deleting or weakening tests.'
                  : '**The cycle itself crashed.** Check cycle-output.log artifact for details.',
                '',
                '## Next steps',
                '1. Read the failing test output in the test-results artifact',
                '2. Identify which src/ file the failure is in',
                '3. Fix the implementation (not the test)',
                '4. Push the fix — CI will re-run automatically',
              ].join('\n'),
              labels: ['ci-failure', 'P0', 'needs-review', 'regression']
            })
